name: Backend PR Checks

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-pr-checks.yml"

jobs:
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-secret-key
      USE_SQLITE_FOR_TESTS: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check formatting with Black
        run: python -m black --check .

      - name: Check import ordering with isort
        run: python -m isort --check-only .

      - name: Run flake8
        run: python -m flake8 . --exclude=.venv

      - name: Run Django system check
        run: python manage.py check

      - name: Verify migrations are up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Run test suite
        run: pytest
